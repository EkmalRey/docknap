version: "2"

run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec

formatters:
  enable:
    - goimports

issues:
  exclude-rules:
    # docker.go and proxy.go are third-party-style HTTP plumbing
    - linters: [errcheck]
      text: "Error return value of `.*Write` is not checked"
