services:
  docknap:
    build: ../..
    container_name: docknap-it
    restart: "no"
    # Integration runs as root solely for direct Docker socket access.
    # Both root and Docker-group socket access are host-root-equivalent.
    user: "0:0"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DOCKNAP_LISTEN=:8000
      - DOCKNAP_IDLE_DEFAULT=5s
      - DOCKNAP_START_TIMEOUT=30s
      - DOCKNAP_NETWORK=docknap-it_network
      - DOCKNAP_LOG_FORMAT=json
    ports:
      - "127.0.0.1:18000:8000"
    networks:
      - docknap-it_network

  demo:
    image: nginx:alpine
    container_name: docknap-demo
    labels:
      - "docknap.enable=true"
      - "docknap.subdomain=demo"
      - "docknap.target_port=80"
      - "docknap.idle_timeout=5s"
      - "docknap.startup_timeout=30s"
      - "docknap.theme=green"
    networks:
      - docknap-it_network

networks:
  # Created by run.sh before `docker compose up`; declared external so Compose
  # attaches to it instead of trying to create a network that already exists
  # (audit #3).
  docknap-it_network:
    external: true
