services:
  nginx:
    image: nginx:1.28-alpine
    container_name: nginx-demo
    labels:
      - "docknap.enable=true"
      - "docknap.subdomain=demo"
      - "docknap.target_port=80"
      - "docknap.idle_timeout=10m"
      - "docknap.startup_timeout=30s"
      - "docknap.health_path=/"
      - "docknap.title=Demo Nginx"
      - "docknap.theme=blue"
    networks:
      - docknap_network

networks:
  docknap_network:
    external: true
