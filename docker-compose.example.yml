services:
  docknap:
    # Pick ONE: build locally or pull the published image. Do not set both.
    image: ghcr.io/ekmalrey/docknap:0.1.0
    # build: .
    container_name: docknap
    restart: unless-stopped
    # The image runs as an unprivileged user, but /var/run/docker.sock is
    # normally root:docker 0660. Pass the docker group GID via group_add
    # so docknap can read/write the socket. Find your host GID:
    #   getent group docker | cut -d: -f3
    group_add:
      - "999"  # host docker GID; adjust to match your system
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DOCKNAP_LISTEN=:8000
      - DOCKNAP_IDLE_DEFAULT=5m
      - DOCKNAP_START_TIMEOUT=60s
      - DOCKNAP_LOG_FORMAT=text
      - DOCKNAP_NETWORK=docknap_network
      - DOCKNAP_ADMIN_HOST=${DOCKNAP_ADMIN_HOST:-}
      - DOCKNAP_ADMIN_USER=${DOCKNAP_ADMIN_USER:-}
      - DOCKNAP_ADMIN_PASS=${DOCKNAP_ADMIN_PASS:-}
    # Defaults are sized for a homelab single-host setup. Tighten for shared hosts.
    mem_limit: 128m
    cpus: 0.5
    pids_limit: 256
    networks:
      - docknap_network

  example-app:
    image: nginx:alpine
    container_name: example-app
    labels:
      - "docknap.enable=true"
      - "docknap.subdomain=demo"
      - "docknap.target_port=80"
      - "docknap.idle_timeout=10m"
      - "docknap.startup_timeout=60s"
      - "docknap.title=Demo App"
      - "docknap.subtitle=powered by docknap"
      - "docknap.icon=◐"
      - "docknap.theme=green"
      - "docknap.show_logs=true"
      - "docknap.show_stats=true"
    networks:
      - docknap_network

networks:
  docknap_network:
    name: docknap_network
    driver: bridge

# Security notes
# --------------
# 1. Put docknap behind a TLS-terminating reverse proxy (Caddy, nginx, Traefik).
#    HTTP Basic Auth sends credentials base64-encoded, NOT encrypted.
# 2. Set DOCKNAP_ADMIN_USER and DOCKNAP_ADMIN_PASS in a .env file. NEVER commit
#    the .env file to git. Use a strong random password (e.g. `openssl rand -hex 24`).
# 3. The Docker socket mount gives docknap root-equivalent control over the host.
#    Treat the docknap port as equivalent to shell access on this host.
