name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version: '1.25'
          cache: true
      - name: gofmt check
        run: test -z "$(gofmt -l .)"
      - name: go mod verify
        run: go mod verify
      - run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9
        with:
          version: v2.4.0
          args: --timeout=5m
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck ./...
      - run: go test -race -count=1 ./...
      - name: integration
        run: tests/integration/run.sh
      - name: Validate tag format
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '$TAG' does not match ^v[0-9]+\.[0-9]+\.[0-9]+$"
            exit 1
          fi
      - name: Validate changelog contains version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          if ! grep -q "\[$VERSION\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md does not contain version $VERSION"
            exit 1
          fi

  publish:
    needs: verify
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.digest.outputs.digest }}
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392
      - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435
      - uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
      - name: Build and push (multi-arch)
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          sbom: true
          provenance: mode=max
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          tags: |
            ghcr.io/${{ github.repository }}:candidate-${{ github.run_id }}-${{ github.run_attempt }}
          labels: |
            org.opencontainers.image.title=docknap
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
      - name: Record image digest
        id: digest
        run: |
          DIGEST=$(docker buildx imagetools inspect "ghcr.io/${{ github.repository }}:candidate-${{ github.run_id }}-${{ github.run_attempt }}" --format '{{json .}}' | jq -r '.Descriptor.digest')
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: ghcr.io/${{ github.repository }}@${{ steps.digest.outputs.digest }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          trivyignores: .trivyignore
      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.digest.outputs.digest }}
          push-to-registry: true
      - name: Publish version tag
        run: |
          docker buildx imagetools create \
            ghcr.io/${{ github.repository }}@${{ steps.digest.outputs.digest }} \
            --tag ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
      - name: Create GitHub release
        uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8
        with:
          generate_release_notes: true
          body: |
            ## ${{ github.ref_name }}

            **Image:** `ghcr.io/${{ github.repository }}@${{ steps.digest.outputs.digest }}`

  promote-latest:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
      - name: Promote highest stable version to latest
        run: |
          HIGHEST=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)
          if [ "$GITHUB_REF_NAME" != "$HIGHEST" ]; then
            echo "Skipping latest: $GITHUB_REF_NAME is not highest stable tag $HIGHEST"
            exit 0
          fi
          docker buildx imagetools create \
            ghcr.io/${{ github.repository }}@${{ needs.publish.outputs.digest }} \
            --tag ghcr.io/${{ github.repository }}:latest
